name: Sync to HF Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_DENTAL_SEG }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api   = HfApi(token=os.environ["HF_TOKEN"])
          repo  = "chocodo/teeth-segmentation-odontoai"

          # Upload everything except gitignored files
          api.upload_folder(
              folder_path = ".",
              repo_id     = repo,
              repo_type   = "space",
              ignore_patterns = [
                  ".git*",
                  "__pycache__",
                  "*.pyc",
                  "data/",
                  "outputs/",
                  ".venv/",
              ],
          )
          print("Done.")
          EOF