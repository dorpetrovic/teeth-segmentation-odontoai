name: Sync to HF Spaces
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_DENTAL_SEG }}
        run: |
          git config --global user.email "dorpetrovic@users.noreply.github.com"
          git config --global user.name "dorpetrovic"
          git push https://chocodo:$HF_TOKEN@huggingface.co/spaces/chocodo/teeth-segmentation-odontoai main --force